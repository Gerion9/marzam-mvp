<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marzam — Restablecer contraseña</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body class="bg-gradient-to-br from-[#1b365d] via-[#152845] to-[#0f1f3a] min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <div class="text-center mb-7">
      <img src="/images/logo_marzam.svg" alt="Marzam" class="h-14 w-auto mx-auto mb-3" onerror="this.style.display='none'">
      <p class="text-blue-200 text-sm">Restablecer contraseña</p>
    </div>

    <form id="form" class="bg-white rounded-2xl shadow-2xl p-6 space-y-4">
      <p class="text-xs text-slate-500">Elige una nueva contraseña para tu cuenta de Marzam.</p>
      <div>
        <label class="block text-xs font-bold text-slate-700 mb-1" for="password">Nueva contraseña</label>
        <input id="password" type="password" autocomplete="new-password" minlength="8"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm"
          placeholder="Mínimo 8 caracteres" required>
      </div>
      <div>
        <label class="block text-xs font-bold text-slate-700 mb-1" for="password2">Confirmar contraseña</label>
        <input id="password2" type="password" autocomplete="new-password"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm"
          required>
      </div>
      <div id="error" class="text-rose-600 text-xs hidden"></div>
      <div id="success" class="text-emerald-700 text-xs hidden">Contraseña actualizada. Redirigiendo al inicio de sesión…</div>
      <button type="submit" id="submit"
        class="w-full py-2.5 bg-[#e5730a] hover:bg-[#c96205] text-white font-bold text-sm rounded-lg disabled:opacity-50">
        Guardar contraseña
      </button>
    </form>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const token = params.get('token');
    const $ = (id) => document.getElementById(id);

    $('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      $('error').classList.add('hidden');
      const pw = $('password').value;
      const pw2 = $('password2').value;
      if (!token) {
        $('error').textContent = 'Falta el token en la URL.';
        $('error').classList.remove('hidden');
        return;
      }
      if (pw.length < 8) {
        $('error').textContent = 'La contraseña debe tener al menos 8 caracteres.';
        $('error').classList.remove('hidden');
        return;
      }
      if (pw !== pw2) {
        $('error').textContent = 'Las contraseñas no coinciden.';
        $('error').classList.remove('hidden');
        return;
      }
      $('submit').disabled = true;
      $('submit').textContent = 'Guardando…';
      try {
        const r = await fetch(`/api/auth/password-reset/${encodeURIComponent(token)}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw }),
        });
        const body = await r.json();
        if (!r.ok) throw new Error(body.error || 'No se pudo restablecer la contraseña.');
        $('success').classList.remove('hidden');
        setTimeout(() => { location.href = '/'; }, 1500);
      } catch (err) {
        $('error').textContent = err.message;
        $('error').classList.remove('hidden');
        $('submit').disabled = false;
        $('submit').textContent = 'Guardar contraseña';
      }
    });
  </script>
</body>
</html>
