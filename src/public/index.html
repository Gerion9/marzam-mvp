<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Territory OS · BlackPrint × Marzam</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/css/blackprint-tokens.css?v=bp-1">
  <link rel="stylesheet" href="/css/territory-os.css?v=tos-1">
</head>
<body class="tos-landing">

  <!-- Demo banner — appears when /api/health reports a non-prod env -->
  <div id="demo-banner" class="tos-demo-banner" hidden>
    Modo demo — datos sintéticos
  </div>

  <main class="tos-stage">
    <div class="tos-inner">

      <!-- Co-brand row: BlackPrint × Marzam -->
      <div class="tos-cobrand">
        <img src="/images/logo-light.png" alt="BlackPrint" class="tos-cobrand-bp">
        <span class="tos-cobrand-x" aria-hidden="true">×</span>
        <img src="/images/logo_marzam.svg" alt="Marzam" class="tos-cobrand-marzam">
      </div>

      <!-- Hero -->
      <h1 class="tos-hero">Territory OS<span class="tos-hero-stop">.</span></h1>
      <p class="tos-sub">Inteligencia geoespacial para campo. Una colaboración de BlackPrint y Marzam.</p>

      <!-- Demo quick-picks: hidden by default; shown only in non-production envs
           (toggled by the inline script after probing /api/health). Hiding via
           the `hidden` attribute so production users never see them even if
           the env probe fails. -->
      <section id="demo-quick-picks" class="tos-demo" hidden>
        <p class="tos-demo-eyebrow">Probar con cuenta demo</p>
        <div class="tos-demo-grid">
          <button data-demo-role="director_sucursal" class="demo-btn tos-demo-btn">
            <span class="tos-demo-dot" data-role="director_sucursal" aria-hidden="true"></span>
            <span class="tos-demo-body">
              <span class="tos-demo-name font-bold">Director</span>
              <span class="tos-demo-sub">Vista completa</span>
            </span>
          </button>
          <button data-demo-role="gerente_ventas" class="demo-btn tos-demo-btn">
            <span class="tos-demo-dot" data-role="gerente_ventas" aria-hidden="true"></span>
            <span class="tos-demo-body">
              <span class="tos-demo-name font-bold">Gerente</span>
              <span class="tos-demo-sub">Sup + Reps</span>
            </span>
          </button>
          <button data-demo-role="supervisor" class="demo-btn tos-demo-btn">
            <span class="tos-demo-dot" data-role="supervisor" aria-hidden="true"></span>
            <span class="tos-demo-body">
              <span class="tos-demo-name font-bold">Supervisor</span>
              <span class="tos-demo-sub">Mis reps</span>
            </span>
          </button>
          <button data-demo-role="representante" class="demo-btn tos-demo-btn">
            <span class="tos-demo-dot" data-role="representante" aria-hidden="true"></span>
            <span class="tos-demo-body">
              <span class="tos-demo-name font-bold">Representante</span>
              <span class="tos-demo-sub">Mi ruta</span>
            </span>
          </button>
        </div>
      </section>

      <!-- Real login -->
      <form id="login-form" class="tos-form" novalidate>
        <p id="login-form-heading" class="tos-form-heading">Inicia con tu cuenta</p>

        <div class="tos-field">
          <label class="tos-label" for="email">Correo electrónico</label>
          <input id="email" class="tos-input login-input" type="email" autocomplete="email" placeholder="usuario@marzam.mx">
        </div>

        <div class="tos-field">
          <label class="tos-label" for="password">Contraseña</label>
          <input id="password" class="tos-input login-input" type="password" autocomplete="current-password" placeholder="••••••••">
        </div>

        <div id="login-error" class="tos-error hidden"></div>

        <button type="submit" id="btn-login" class="tos-btn-primary">Iniciar sesión</button>
      </form>

      <p class="tos-footer">© 2026 Marzam · Plataforma operativa interna</p>

    </div>
  </main>

  <script src="/js/api.js"></script>
  <script>
    const DEMO_CREDS = {
      director_sucursal: { email: 'director@demo.marzam.mx', password: 'Demo2026!' },
      gerente_ventas:    { email: 'gerente@demo.marzam.mx', password: 'Demo2026!' },
      supervisor:        { email: 'supervisor@demo.marzam.mx', password: 'Demo2026!' },
      representante:     { email: 'rep@demo.marzam.mx', password: 'Demo2026!' },
    };

    // Show the demo quick-picks only outside the production deployment.
    // - Local dev / tests:   env !== 'production'                       → show
    // - Vercel qa-staging:   NODE_ENV=production, VERCEL_ENV=preview    → show
    // - Vercel production:   NODE_ENV=production, VERCEL_ENV=production → HIDE
    // Failures default to "stay hidden" — never show demo by accident
    // on a misconfigured deploy.
    (async () => {
      try {
        const r = await fetch('/api/health', { cache: 'no-store' });
        if (!r.ok) return;
        const j = await r.json();
        if (!j) return;
        const isLocalNonProd = j.env && j.env !== 'production';
        const isVercelPreview = j.vercel_env && j.vercel_env !== 'production';
        if (!isLocalNonProd && !isVercelPreview) return;
        const el = document.getElementById('demo-quick-picks');
        if (el) el.hidden = false;
        const banner = document.getElementById('demo-banner');
        if (banner) banner.hidden = false;
        // When the demo block is shown, the form heading reads as a
        // continuation ("o inicia…"). Otherwise we keep the cleaner
        // standalone heading set in the markup.
        const h = document.getElementById('login-form-heading');
        if (h) h.textContent = 'o inicia con tu cuenta real';
      } catch { /* keep hidden */ }
    })();

    // Landing route depends on role:
    //   blackprint_admin → /blackprint   (BlackPrint platform team)
    //   admin / national_admin → /admin  (Marzam client admin)
    //   everyone else → /app             (rep / supervisor / etc.)
    function landingFor(user) {
      const role = String(user?.role || '').toLowerCase();
      if (role === 'blackprint_admin') return '/blackprint';
      if (role === 'admin' || role === 'national_admin') return '/admin';
      return '/app';
    }

    // If already authenticated, jump to landing
    if (API.isAuth()) {
      const u = API.user();
      if (u && (u.role || u.email)) location.href = landingFor(u);
    }

    // Demo quick-picks
    document.querySelectorAll('[data-demo-role]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const role = btn.dataset.demoRole;
        const creds = DEMO_CREDS[role];
        if (!creds) return;
        btn.disabled = true;
        try {
          const user = await API.login(creds.email, creds.password);
          localStorage.setItem('marzam_demo', '1');
          location.href = landingFor(user);
        } catch (err) {
          // Fallback offline-only demo (cuando el backend no está corrido)
          const demoUser = {
            id: `u-${role.split('_')[0].slice(0, 3)}-001`,
            email: creds.email,
            full_name: btn.querySelector('.font-bold').textContent + ' Demo',
            role,
          };
          localStorage.setItem('token', `demo_${role}`);
          localStorage.setItem('user', JSON.stringify(demoUser));
          localStorage.setItem('marzam_demo', '1');
          location.href = landingFor(demoUser);
        }
      });
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('login-error');
      const btn = document.getElementById('btn-login');
      errEl.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Iniciando sesión…';
      try {
        const user = await API.login(
          document.getElementById('email').value.trim(),
          document.getElementById('password').value,
        );
        localStorage.removeItem('marzam_demo');
        location.href = landingFor(user);
      } catch (err) {
        // Map common HTTP statuses to user-facing messages. Falls back to the
        // server-provided `error` field, then a generic catch-all. We don't
        // distinguish "user not found" vs "wrong password" on purpose — that
        // disclosure is a security anti-pattern.
        let msg = err && err.error;
        if (!msg) {
          if (err && err.status === 401) msg = 'Credenciales inválidas. Verifica tu correo y contraseña.';
          else if (err && err.status === 423) msg = 'Cuenta bloqueada. Contacta a soporte.';
          else if (err && err.status === 429) msg = 'Demasiados intentos. Espera unos minutos e inténtalo de nuevo.';
          else if (err && err.status >= 500) msg = 'Error del servidor. Intenta de nuevo en unos segundos.';
          else if (err instanceof TypeError) msg = 'Sin conexión. Revisa tu red e inténtalo de nuevo.';
          else msg = 'Error al iniciar sesión.';
        }
        errEl.textContent = msg;
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Iniciar sesión';
      }
    });
  </script>
</body>
</html>
