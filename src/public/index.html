<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marzam — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body class="bg-gradient-to-br from-[#1b365d] via-[#152845] to-[#1b365d] min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <img src="/images/logo_marzam.svg" alt="Marzam Logo" class="h-14 w-auto mx-auto mb-4">
      <p class="text-blue-200 text-sm mt-1">Pharmacy Market Capture Platform</p>
    </div>

    <form id="login-form" class="bg-white rounded-2xl shadow-2xl p-8 space-y-5">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1" for="email">Email</label>
        <input id="email" type="email" autofocus
          class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
          placeholder="usuario@marzam.mx">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1" for="password">Password</label>
        <input id="password" type="password"
          class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
          placeholder="••••••••">
      </div>
      <div id="login-error" class="text-red-600 text-sm hidden"></div>
      <button type="submit" id="btn-login"
        class="w-full py-2.5 bg-[#e5730a] hover:bg-[#c96205] text-white font-semibold rounded-lg transition disabled:opacity-50">
        Log in
      </button>

      <div class="relative flex items-center gap-3 my-1">
        <div class="flex-1 h-px bg-slate-200"></div>
        <span class="text-xs text-slate-400 font-medium">or</span>
        <div class="flex-1 h-px bg-slate-200"></div>
      </div>

      <button type="button" id="btn-demo"
        class="w-full py-2.5 bg-gradient-to-r from-violet-600 to-blue-600 hover:from-violet-700 hover:to-blue-700 text-white font-semibold rounded-lg transition flex items-center justify-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Try Demo (no database needed)
      </button>
      <button type="button" id="btn-demo-rep"
        class="w-full py-2.5 bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-700 hover:to-teal-700 text-white font-semibold rounded-lg transition flex items-center justify-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Try Demo (Field Rep)
      </button>
      <p class="text-center text-slate-400 text-xs -mt-2">Loads with sample CDMX pharmacy data</p>
    </form>

    <p class="text-center text-blue-400/60 text-xs mt-6">Built by BlackPrint</p>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const isDemo = localStorage.getItem('marzam_demo') === '1';
    if (API.isAuth() || isDemo) {
      const u = API.user();
      if (u?.role === 'manager') {
        location.href = '/manager.html';
      } else if (u?.role === 'field_rep') {
        location.href = '/rep.html';
      } else {
        localStorage.clear();
      }
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('login-error');
      const btn = document.getElementById('btn-login');
      errEl.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Logging in…';
      try {
        const user = await API.login(
          document.getElementById('email').value.trim(),
          document.getElementById('password').value,
        );
        location.href = user.role === 'manager' ? '/manager.html' : '/rep.html';
      } catch (err) {
        errEl.textContent = err.error || 'Login failed. Have you set up the database?';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Log in';
      }
    });

    document.getElementById('btn-demo').addEventListener('click', () => {
      localStorage.setItem('marzam_demo', '1');
      localStorage.setItem('user', JSON.stringify({
        id: 'demo', email: 'demo@marzam.mx',
        full_name: 'Demo Manager', role: 'manager',
      }));
      location.href = '/manager.html';
    });

    document.getElementById('btn-demo-rep').addEventListener('click', () => {
      localStorage.setItem('marzam_demo', '1');
      localStorage.setItem('user', JSON.stringify({
        id: 'rep1', email: 'carlos@marzam.mx',
        full_name: 'Carlos Lopez', role: 'field_rep',
      }));
      location.href = '/rep.html';
    });
  </script>
</body>
</html>
