<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marzam — Iniciar Sesión</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body class="bg-gradient-to-br from-[#1b365d] via-[#152845] to-[#1b365d] min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <img src="/images/logo_marzam.svg" alt="Marzam Logo" class="h-14 w-auto mx-auto mb-4">
      <p class="text-blue-200 text-sm mt-1">Plataforma de Captura de Mercado Farmacéutico</p>
    </div>

    <form id="login-form" class="bg-white rounded-2xl shadow-2xl p-8 space-y-5">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1" for="email">Correo electrónico</label>
        <input id="email" type="email" autofocus
          class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
          placeholder="usuario@marzam.mx">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1" for="password">Contraseña</label>
        <input id="password" type="password"
          class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
          placeholder="••••••••">
      </div>
      <div id="login-error" class="text-red-600 text-sm hidden"></div>
      <button type="submit" id="btn-login"
        class="w-full py-2.5 bg-[#e5730a] hover:bg-[#c96205] text-white font-semibold rounded-lg transition disabled:opacity-50">
        Iniciar sesión
      </button>
    </form>

    <p class="text-center text-blue-400/60 text-xs mt-6">Desarrollado por BlackPrint</p>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const isDemo = localStorage.getItem('marzam_demo') === '1';
    if (API.isAuth() || isDemo) {
      const u = API.user();
      if (u?.role === 'manager') {
        location.href = '/manager.html';
      } else if (u?.role === 'field_rep') {
        location.href = '/rep.html';
      } else {
        localStorage.clear();
      }
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('login-error');
      const btn = document.getElementById('btn-login');
      errEl.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Iniciando sesión…';
      try {
        const user = await API.login(
          document.getElementById('email').value.trim(),
          document.getElementById('password').value,
        );
        location.href = user.role === 'manager' ? '/manager.html' : '/rep.html';
      } catch (err) {
        errEl.textContent = err.error || 'Error al iniciar sesión. Verifica tus credenciales.';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Iniciar sesión';
      }
    });
  </script>
</body>
</html>
