<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Marzam — Representante</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body class="h-screen w-screen overflow-hidden bg-slate-50">

  <div id="demo-banner" class="hidden absolute top-0 left-0 right-0 z-[9999] bg-gradient-to-r from-violet-600 to-blue-600 text-white text-center text-[11px] font-bold py-1 tracking-wide">
    Modo Demo — Datos Sintéticos
  </div>

  <div id="map" class="absolute inset-0 z-0"></div>

  <div id="route-strip" class="absolute top-4 left-4 right-4 z-50 flex items-center justify-between bg-white/95 backdrop-blur-md shadow-lg shadow-slate-200/50 rounded-2xl px-4 py-3 border border-slate-100 transition-transform hidden">
    <div class="flex items-center gap-3">
      <span id="strip-progress" class="bg-[#1b365d] text-white font-bold text-xs px-2 py-1 rounded-md"></span>
      <span id="strip-objective" class="text-slate-800 font-bold text-sm"></span>
    </div>
    <div class="flex items-center gap-2">
      <button id="btn-tracking" class="text-[10px] font-bold uppercase tracking-wide bg-slate-100 text-slate-500 px-2 py-1 rounded-md">GPS Off</button>
      <a id="btn-gmaps" href="#" target="_blank" class="text-[10px] font-bold uppercase tracking-wide bg-blue-50 text-blue-600 px-2 py-1 rounded-md">Google Maps</a>
    </div>
  </div>

  <div id="header-bar" class="absolute top-4 left-4 right-4 z-50 flex items-center justify-between bg-white/95 backdrop-blur-md shadow-lg shadow-slate-200/50 rounded-2xl px-4 py-3 border border-slate-100 transition-transform">
    <div class="flex items-center gap-3">
      <img src="/images/logo_marzam.svg" alt="Marzam" class="h-6 w-auto select-none">
      <span id="rep-name" class="text-slate-500 font-medium text-xs"></span>
    </div>
    <button id="btn-logout" class="text-rose-600 text-xs font-bold uppercase tracking-wide">Salir</button>
  </div>

  <div id="main-sheet" class="snap-sheet glass" data-snap="peek">
    <div class="sheet-handle" id="sheet-handle"></div>
    <div class="px-4 pb-3 border-b border-slate-200/50">
      <select id="sel-assignment" class="form-input form-select text-sm">
        <option value="">Seleccionar asignación...</option>
      </select>
    </div>
    <div id="stop-list" class="flex-1 overflow-y-auto px-4 py-3">
      <p id="stop-empty" class="text-center text-slate-400 text-sm py-6">Selecciona una asignación para comenzar tu ruta.</p>
    </div>
  </div>

  <div id="visit-sheet" class="snap-sheet glass" data-snap="hidden" style="z-index:calc(var(--z-sheet, 40) + 1)">
    <div class="sheet-handle"></div>
    <div class="px-4 pt-1 pb-2 flex items-center justify-between border-b border-slate-200/50">
      <h3 class="font-semibold">Reporte de Visita</h3>
      <button onclick="closeVisitSheet()" class="btn btn-ghost text-slate-400 p-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="px-4 py-3 overflow-y-auto" style="max-height:70vh">
      <p id="visit-pharmacy-name" class="text-sm text-slate-500 mb-3"></p>
      <form id="visit-form" class="space-y-3">
        <input type="hidden" id="v-pharmacy-id">
        <input type="hidden" id="v-stop-id">

        <div class="form-field"><label class="form-label">Resultado *</label>
          <select id="v-outcome" required class="form-input form-select">
            <option value="">Seleccionar...</option>
            <option value="visited">Visitado</option>
            <option value="contact_made">Contacto realizado</option>
            <option value="interested">Interesado</option>
            <option value="not_interested">No interesado</option>
            <option value="needs_follow_up">Requiere seguimiento</option>
            <option value="closed">Cerrado</option>
            <option value="invalid">Inválido</option>
            <option value="duplicate">Duplicado</option>
            <option value="moved">Se mudó</option>
            <option value="wrong_category">Categoría incorrecta</option>
            <option value="chain_not_independent">Cadena / No independiente</option>
          </select></div>

        <div class="form-field"><label class="form-label">Notas *</label>
          <textarea id="v-notes" required rows="2" class="form-input" placeholder="Observaciones..."></textarea></div>

        <div class="form-field"><label class="form-label">Potencial de Pedido ($)</label>
          <input id="v-potential" type="number" step="0.01" class="form-input" placeholder="Demanda estimada"></div>

        <div class="form-field"><label class="form-label">Productos de Competencia</label>
          <input id="v-competitors" type="text" class="form-input" placeholder="Marcas vistas en anaquel"></div>

        <div class="form-field"><label class="form-label">Observaciones de Inventario</label>
          <input id="v-stock" type="text" class="form-input" placeholder="Niveles de stock, espacio en anaquel..."></div>

        <div id="v-followup-fields" class="hidden space-y-3">
          <div class="form-field"><label class="form-label">Fecha de Seguimiento *</label><input id="v-followup-date" type="date" class="form-input"></div>
          <div class="form-field"><label class="form-label">Motivo del Seguimiento *</label><input id="v-followup-reason" type="text" class="form-input"></div>
        </div>
        <div id="v-flag-fields" class="hidden">
          <div class="form-field"><label class="form-label">Motivo de la Bandera *</label><input id="v-flag-reason" type="text" class="form-input" placeholder="Describe el problema..."></div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div class="form-field"><label class="form-label">Contacto</label><input id="v-contact" type="text" class="form-input"></div>
          <div class="form-field"><label class="form-label">Teléfono</label><input id="v-phone" type="tel" class="form-input"></div>
        </div>

        <div class="form-field"><label class="form-label">Foto de Evidencia *</label>
          <input id="v-photo" type="file" accept="image/*" capture="environment" required class="form-input" style="padding:8px"></div>

        <button type="submit" id="btn-submit-visit" class="btn btn-primary w-full py-2.5">Enviar Visita</button>
      </form>
    </div>
  </div>

  <div id="skip-sheet" class="snap-sheet glass" data-snap="hidden" style="z-index:calc(var(--z-sheet, 40) + 1)">
    <div class="sheet-handle"></div>
    <div class="px-4 pt-1 pb-2 flex items-center justify-between border-b border-slate-200/50">
      <h3 class="font-semibold">Omitir Parada</h3>
      <button onclick="closeSkipSheet()" class="btn btn-ghost text-slate-400 p-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="px-4 py-3">
      <p id="skip-pharmacy-name" class="text-sm text-slate-500 mb-3"></p>
      <form id="skip-form" class="space-y-3">
        <input type="hidden" id="skip-stop-id">
        <input type="hidden" id="skip-pharmacy-id">
        <div class="form-field"><label class="form-label">Motivo para omitir *</label>
          <select id="skip-reason" required class="form-input form-select">
            <option value="">Seleccionar motivo...</option>
            <option value="closed">Cerrado/Clausurado</option>
            <option value="inaccessible">No se puede acceder</option>
            <option value="safety">Problema de seguridad</option>
            <option value="other">Otro</option>
          </select></div>
        <div class="form-field"><label class="form-label">Notas</label>
          <textarea id="skip-notes" rows="2" class="form-input" placeholder="Detalles..."></textarea></div>
        <div class="form-field"><label class="form-label">Foto de Evidencia</label>
          <input id="skip-photo" type="file" accept="image/*" capture="environment" class="form-input" style="padding:8px"></div>
        <button type="submit" class="btn btn-danger w-full py-2.5">Confirmar Omisión</button>
      </form>
    </div>
  </div>

  <div id="new-pharmacy-sheet" class="snap-sheet glass" data-snap="hidden" style="z-index:calc(var(--z-sheet, 40) + 1)">
    <div class="sheet-handle"></div>
    <div class="px-4 pt-1 pb-2 flex items-center justify-between border-b border-slate-200/50">
      <h3 class="font-semibold">Nueva Farmacia</h3>
      <button onclick="closeNewSheet()" class="btn btn-ghost text-slate-400 p-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="px-4 py-3">
      <form id="new-pharmacy-form" class="space-y-3">
        <div class="form-field"><label class="form-label">Nombre *</label><input id="np-name" required class="form-input"></div>
        <div class="form-field"><label class="form-label">Dirección</label><input id="np-address" class="form-input"></div>
        <div class="form-field"><label class="form-label">Persona de Contacto</label><input id="np-contact" class="form-input"></div>
        <div class="form-field"><label class="form-label">Teléfono</label><input id="np-phone" type="tel" class="form-input"></div>
        <div class="form-field"><label class="form-label">Tipo</label>
          <select id="np-independent" class="form-input form-select">
            <option value="true">Independiente</option>
            <option value="false">Cadena</option>
          </select></div>
        <div class="form-field"><label class="form-label">Foto *</label>
          <input id="np-photo" type="file" accept="image/*" capture="environment" required class="form-input" style="padding:8px"></div>
        <div class="form-field"><label class="form-label">Notas</label><textarea id="np-notes" rows="2" class="form-input"></textarea></div>
        <p class="text-xs text-slate-400">Ubicación capturada automáticamente por GPS.</p>
        <button type="submit" class="btn btn-success w-full py-2.5">Enviar para Revisión</button>
      </form>
    </div>
  </div>

  <button id="fab-new" onclick="openNewSheet()" class="fab bg-[#e5730a] hover:bg-[#c96205] text-white" style="bottom:auto;top:80px;right:16px" title="Agregar Farmacia">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14m-7-7h14"/></svg>
  </button>

  <script src="/js/api.js?v=ecatepec-2"></script>
  <script src="/js/demo.js?v=ecatepec-2"></script>
  <script src="/js/rep.js?v=ecatepec-2"></script>
</body>
</html>
